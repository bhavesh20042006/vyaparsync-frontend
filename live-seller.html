<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Live Studio - Vyaparsync</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        .video-container {
            width: 100%;
            height: 400px;
            background-color: #111;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .chat-box {
            height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm p-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <h1 class="text-xl font-bold text-blue-600">Vyaparsync</h1>
            <span class="bg-red-100 text-red-600 px-2 py-1 text-xs font-bold rounded">LIVE STUDIO</span>
        </div>
        <button onclick="window.location.href='seller-dashboard.html'" class="text-sm text-gray-500 hover:text-gray-800">
            Exit Studio
        </button>
    </header>

    <main class="flex-grow p-4 md:p-6 max-w-6xl mx-auto w-full flex flex-col md:flex-row gap-6">
        
        <!-- Left Column: Video & Controls -->
        <div class="flex-grow flex flex-col gap-4">
            <!-- Video Area -->
            <div id="video-wrapper" class="video-container shadow-lg">
                <div id="local-player" class="w-full h-full"></div>
                <div class="absolute top-4 left-4 bg-red-600 text-white px-2 py-1 rounded text-sm font-bold flex items-center gap-2">
                    <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span>
                    LIVE
                </div>
                <div class="absolute top-4 right-4 bg-black/50 text-white px-2 py-1 rounded text-sm backdrop-blur-sm">
                    👁️ <span id="viewer-count">0</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="bg-white p-4 rounded-xl shadow-sm flex flex-col sm:flex-row gap-4 items-center justify-between">
                <div class="flex gap-2">
                    <button id="start-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                        Start Broadcast
                    </button>
                    <button id="stop-btn" class="bg-red-50 hover:bg-red-100 text-red-600 px-6 py-2 rounded-lg font-medium transition-colors hidden">
                        End Stream
                    </button>
                </div>
                
                <div class="flex gap-2">
                    <button id="pin-btn" class="bg-orange-50 hover:bg-orange-100 text-orange-600 border border-orange-200 px-4 py-2 rounded-lg font-medium transition-colors flex items-center gap-2 hidden">
                        📌 Pin "Kurta Pajama"
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Column: Live Chat -->
        <div class="w-full md:w-80 bg-white rounded-xl shadow-sm flex flex-col h-[500px]">
            <div class="p-4 border-b">
                <h2 class="font-bold">Live Chat</h2>
            </div>
            <div id="chat-messages" class="flex-grow p-4 chat-box flex flex-col gap-3">
                <!-- Chat messages will appear here -->
                <div class="text-center text-sm text-gray-400 my-4">Welcome to Live Studio chat</div>
            </div>
            <div class="p-4 border-t flex gap-2">
                <input type="text" id="chat-input" class="flex-grow bg-gray-100 border-none rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Type a message...">
                <button id="send-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Send</button>
            </div>
        </div>

    </main>

    <script>
        // Configuration
        const APP_ID = "f62fb65919dd45019a3ce50d2dcce0c0";
        // Using a fixed stream ID for demo purposes, in production this comes from DB/URL params
        const STREAM_ID = "vyaparsync_live_demo"; 
        const SERVER_URL = "http://localhost:5000"; // Update for production

        // State
        let client = null;
        let localTracks = {
            videoTrack: null,
            audioTrack: null
        };
        let socket = null;
        let isBroadcasting = false;

        // DOM Elements
        const startBtn = document.getElementById("start-btn");
        const stopBtn = document.getElementById("stop-btn");
        const pinBtn = document.getElementById("pin-btn");
        const viewerCountEl = document.getElementById("viewer-count");
        const chatMessages = document.getElementById("chat-messages");
        const chatInput = document.getElementById("chat-input");
        const sendBtn = document.getElementById("send-btn");

        // Initialize Socket.io
        function initSocket() {
            socket = io(SERVER_URL);
            
            socket.on("connect", () => {
                console.log("Connected to server");
                socket.emit('join_stream', STREAM_ID);
            });

            socket.on('viewer_count_update', (count) => {
                viewerCountEl.innerText = count;
            });

            socket.on('receive_chat_message', (data) => {
                addChatMessage(data.username, data.message, data.isSeller);
            });
        }

        // Initialize Agora
        async function startBroadcast() {
            try {
                // 1. Create client
                client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
                await client.setClientRole("host");

                // 2. Join Channel
                // Token is null for testing if app allows it, otherwise need token server
                await client.join(APP_ID, STREAM_ID, null, null); 

                // 3. Create local tracks
                const [audioTrack, videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
                localTracks.audioTrack = audioTrack;
                localTracks.videoTrack = videoTrack;

                // 4. Play local video
                videoTrack.play("local-player");

                // 5. Publish tracks
                await client.publish(Object.values(localTracks));
                console.log("Publish success");
                
                isBroadcasting = true;
                updateUI();
                initSocket(); // Connect to real-time events when going live

            } catch (error) {
                console.error("Failed to start broadcast:", error);
                alert("Failed to access camera/mic or connect to Agora. Check permissions.");
            }
        }

        async function stopBroadcast() {
            if (localTracks.videoTrack) {
                localTracks.videoTrack.stop();
                localTracks.videoTrack.close();
            }
            if (localTracks.audioTrack) {
                localTracks.audioTrack.stop();
                localTracks.audioTrack.close();
            }
            if (client) {
                await client.leave();
            }
            if (socket) {
                socket.disconnect();
            }
            
            document.getElementById("local-player").innerHTML = "";
            isBroadcasting = false;
            updateUI();
        }

        function updateUI() {
            if (isBroadcasting) {
                startBtn.classList.add("hidden");
                stopBtn.classList.remove("hidden");
                pinBtn.classList.remove("hidden");
            } else {
                startBtn.classList.remove("hidden");
                stopBtn.classList.add("hidden");
                pinBtn.classList.add("hidden");
                viewerCountEl.innerText = "0";
            }
        }

        function pinProduct() {
            if (!socket) return;
            
            const productDetails = {
                id: "item_kurta_001",
                name: "Premium Kurta Pajama Set",
                price: 1780.00,
                image: "https://via.placeholder.com/150/f0f9ff/0369a1?text=Kurta" // Placeholder image
            };
            
            socket.emit('seller_pin_product', { 
                streamId: STREAM_ID, 
                productId: productDetails.id,
                productDetails: productDetails
            });
            
            // Visual feedback
            pinBtn.innerHTML = "✅ Pinned!";
            setTimeout(() => {
                pinBtn.innerHTML = "📌 Pin \"Kurta Pajama\"";
            }, 2000);
        }

        function sendChat() {
            const msg = chatInput.value.trim();
            if (!msg || !socket) return;
            
            socket.emit('send_chat_message', {
                streamId: STREAM_ID,
                username: "Seller (Host)",
                message: msg,
                isSeller: true
            });
            
            chatInput.value = "";
        }

        function addChatMessage(username, message, isSeller) {
            const msgEl = document.createElement("div");
            msgEl.className = `p-3 rounded-lg text-sm ${isSeller ? 'bg-blue-50 border border-blue-100' : 'bg-gray-50 border border-gray-100'}`;
            msgEl.innerHTML = `
                <div class="font-bold ${isSeller ? 'text-blue-600' : 'text-gray-700'}">${username}</div>
                <div class="text-gray-800 mt-1">${message}</div>
            `;
            chatMessages.appendChild(msgEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Event Listeners
        startBtn.addEventListener("click", startBroadcast);
        stopBtn.addEventListener("click", stopBroadcast);
        pinBtn.addEventListener("click", pinProduct);
        sendBtn.addEventListener("click", sendChat);
        chatInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendChat();
        });

    </script>
</body>
</html>
