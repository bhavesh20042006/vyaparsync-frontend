<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | VyaparSync</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; padding: 0;">

    <a href="index.html" style="position: absolute; top: 25px; left: 25px; text-decoration: none; color: var(--text-main); font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 5px;">
        ⬅ Back to Market
    </a>

    <button onclick="toggleDark()" style="position: absolute; top: 15px; right: 25px; width: auto; padding: 8px 15px; background: var(--text-main); color: var(--bg-color);">🌙</button>

    <div class="auth-wrapper">
        <div class="auth-container" style="animation-delay: 0.1s;">
            <div class="auth-header">
                <h2>Join VyaparSync 🛍️</h2>
                <p>Create an account to track orders and save your cart.</p>
            </div>
            
            <form id="customerRegisterForm">
                <div class="input-group">
                    <input type="text" id="customerName" placeholder=" " required>
                    <label>Full Name</label>
                </div>

                <div class="input-group">
                    <input type="email" id="customerEmail" placeholder=" " required>
                    <label>Email Address</label>
                </div>
                
                <div class="input-group" style="margin-bottom: 30px;">
                    <input type="password" id="customerPassword" placeholder=" " required>
                    <label>Create Password</label>
                </div>
                
                <button type="submit" class="auth-submit-btn">Create Account ✨</button>
            </form>

            <div class="auth-links" style="margin-top: 25px;">
                <p>Already have an account? <a href="login.html">Log In</a></p>
                <p style="margin-top: 10px; font-size: 12px;"><a href="retailer-register.html" style="color: var(--text-muted); font-weight: normal; text-decoration: underline;">Wait, I want to register as a seller instead.</a></p>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<script src="script.js?v=5"></script>

</body>
</html>
